<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IMC con JavaScript</title>
</head>
<body>

    <h1>Calcular IMC</h1>

    <p>Peso (kg):</p>
    <input type="number" id="peso">

    <p>Altura (metros):</p>
    <input type="number" step="0.01" id="altura">

    <br><br>

    <button onclick="calcularIMC()">Calcular IMC</button>

    <p id="resultado"></p>

    <script>
        function calcularIMC() {
            // Obtener datos
            var peso = Number(document.getElementById("peso").value);
            var altura = Number(document.getElementById("altura").value);

            // Calcular IMC
            var imc = peso / (altura * altura);

            // Clasificacion
            var estado = "";

            if (imc < 18.5) {
                estado = "Bajo peso";
            } else if (imc < 25) {
                estado = "Normal";
            } else if (imc < 30) {
                estado = "Sobrepeso";
            } else {
                estado = "Obesidad";
            }

            // Resultado
            document.getElementById("resultado").innerHTML =
                "IMC: " + imc.toFixed(2) + "<br>" +
                "Estado: " + estado;
        }
    </script>

</body>
</html>
